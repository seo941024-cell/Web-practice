<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>SKULL : READY TO DIE</title>
    <!-- 찐 레트로 도트 한글 폰트 'Neo 둥근모꼴' 적용 -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/neodgm/neodgm-webfont@1.530/neodgm/style.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "NeoDunggeunmo", monospace;
      }
      body {
        background: #050508;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        color: #e0d8c0;
      }
      #wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }
      #topBar {
        width: 960px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 20px;
        background: #0d0d14;
        border: 3px solid #332222;
        font-size: 18px;
        box-shadow: 0 0 10px #ff000033;
      }
      .hpArea {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .hpLabel {
        color: #ff2222;
        font-weight: bold;
        text-shadow: 0 0 5px #ff0000;
      }
      .hearts {
        display: flex;
        gap: 5px;
      }
      .heart {
        width: 20px;
        height: 20px;
        background: #ff1111;
        border: 2px solid #ffaaaa;
        box-shadow: 0 0 5px #ff0000;
      }
      .heart.empty {
        background: #1a0505;
        border-color: #331111;
        box-shadow: none;
      }
      #stageLabel {
        color: #ffaa00;
        font-weight: bold;
        font-size: 20px;
        text-shadow: 0 0 5px #ff8800;
      }
      #scoreLabel {
        color: #aaaaff;
        font-size: 18px;
      }
      #canvasWrap {
        position: relative;
        width: 960px;
        height: 540px;
        box-shadow: 0 0 30px #000;
      }
      canvas {
        width: 100%;
        height: 100%;
        display: block;
        image-rendering: -moz-crisp-edges;
        image-rendering: -webkit-optimize-contrast;
        image-rendering: crisp-edges;
        image-rendering: pixelated;
        border: 4px solid #221111;
      }
      #overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.92);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 20;
      }
      #overlay h1 {
        font-size: 60px;
        color: #ff2222;
        margin-bottom: 20px;
        text-shadow: 0 0 20px #ff0000;
      }
      .sub {
        color: #d0c0c0;
        font-size: 18px;
        margin: 8px 0;
        text-align: center;
      }
      .startBtn {
        margin-top: 40px;
        padding: 15px 40px;
        background: #2a0a0a;
        border: 3px solid #ff2222;
        color: #ffcccc;
        font-size: 24px;
        cursor: pointer;
        letter-spacing: 2px;
        transition: 0.2s;
      }
      .startBtn:hover {
        background: #5a1010;
        box-shadow: 0 0 20px #ff0000;
      }
      #bottomBar {
        width: 960px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 20px;
        background: #0d0d14;
        border: 3px solid #332222;
        font-size: 16px;
        color: #888;
      }
      #bossBarWrap {
        width: 960px;
        background: #0d0d14;
        border: 3px solid #ff0000;
        padding: 8px 15px;
        display: none;
        box-shadow: 0 0 15px #ff0000;
      }
      #bossBarLabel {
        font-size: 16px;
        color: #ff2222;
        margin-bottom: 5px;
        font-weight: bold;
      }
      #bossTrack {
        height: 16px;
        background: #200505;
      }
      #bossFill {
        height: 100%;
        background: #ff1111;
        transition: width 0.1s;
        box-shadow: 0 0 10px #ff0000;
      }
    </style>
  </head>
  <body>
    <div id="wrapper">
      <div id="topBar">
        <div class="hpArea">
          <span class="hpLabel">HP</span>
          <div class="hearts" id="hearts"></div>
        </div>
        <div id="stageLabel">STAGE 1-1</div>
        <div id="scoreLabel">SCORE: 0</div>
      </div>
      <div id="bossBarWrap">
        <div id="bossBarLabel">BOSS</div>
        <div id="bossTrack"><div id="bossFill" style="width: 100%"></div></div>
      </div>
      <div id="canvasWrap">
        <canvas id="c" width="640" height="360"></canvas>
        <div id="overlay">
          <h1>SKULL IN DUNGEON</h1>
          <p class="sub">
            전생했더니 지하미궁 100층에서 환생한 해골이 되었다.<br />궁금하진
            않지만 일단 나아가야겠죠?
          </p>
          <p
            class="sub"
            style="color: #ff5555; font-weight: bold; margin-top: 15px"
          >
            [경고] 보라색 탄막과 거대 레이저는 가드 불가입니다!
          </p>
          <p class="sub" style="color: #27ae60; margin-top: 15px">
            [조작] ← → 이동 | Z 점프(2단) | X 공격 | C 스킬 | V 가드
          </p>
          <button class="startBtn" id="startBtn">▶ READY TO DIE</button>
        </div>
      </div>
      <div id="bottomBar">
        <span id="killLabel">처치: 0</span>
        <span id="skillLabel" style="color: #27ae60">SKILL READY</span>
      </div>
    </div>
    <script>
      const C = document.getElementById("c"),
        ctx = C.getContext("2d");
      ctx.imageSmoothingEnabled = false;
      const CW = 640,
        CH = 360,
        GRAV = 0.55,
        TILE = 20,
        SKILL_MAX = 200;

      let gs = "menu",
        score = 0,
        kills = 0,
        worldN = 1,
        levelN = 1,
        camX = 0,
        invT = 0,
        skillCD = 0,
        camShake = 0;
      let player = null,
        platforms = [],
        enemies = [],
        bullets = [],
        eBullets = [],
        parts = [],
        doors = [],
        lasers = [];
      let levelW = 0;

      const K = {};
      document.addEventListener("keydown", (e) => {
        K[e.code] = true;
        if (
          ["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(
            e.code,
          )
        )
          e.preventDefault();
      });
      document.addEventListener("keyup", (e) => {
        K[e.code] = false;
      });
      const dn = (...c) => c.some((x) => K[x]);

      function mkP(x, y) {
        return {
          x,
          y,
          w: 14,
          h: 18,
          vx: 0,
          vy: 0,
          onGround: false,
          hp: 3,
          maxHp: 3,
          facing: 1,
          atkT: 0,
          atkAnim: 0,
          fr: 0,
          frT: 0,
          jpOld: false,
          kbT: 0,
          guarding: false,
          jumpCount: 0,
        };
      }

      function mkEnemy(x, y, w) {
        const rand = Math.random();
        let type = "melee";
        if (w >= 1) {
          if (rand < 0.25) type = "ranged_laser";
          else if (rand < 0.5) type = "ranged_bullet";
        }
        const hp = 2 + w * 2;
        return {
          x,
          y,
          w: 12,
          h: 16,
          vx: 0,
          vy: 0,
          onGround: false,
          hp,
          maxHp: hp,
          type,
          isBoss: false,
          facing: 1,
          fr: 0,
          frT: 0,
          flash: 0,
          sT: 80 + Math.random() * 60,
          sI: 60 + Math.random() * 30,
          pDir: Math.random() < 0.5 ? 1 : -1,
          pT: 0,
          dead: false,
          kbT: 0,
          warnT: 0,
          warnData: null,
          world: w,
        };
      }

      function mkBoss(x, y, w) {
        const hp = 50 + w * 30;
        return {
          x,
          y,
          w: 28,
          h: 36,
          vx: 0,
          vy: 0,
          onGround: false,
          hp,
          maxHp: hp,
          type: "boss",
          isBoss: true,
          facing: 1,
          fr: 0,
          frT: 0,
          flash: 0,
          sT: 90,
          sI: 80,
          phase: 1,
          mT: 80,
          ap: 0,
          dead: false,
          kbT: 0,
          warnT: 0,
          warnData: null,
          world: w,
        };
      }

      function genStage(w, l) {
        platforms = [];
        enemies = [];
        bullets = [];
        eBullets = [];
        parts = [];
        doors = [];
        lasers = [];
        kills = 0;
        skillCD = 0;
        invT = 0;
        const isBoss = l === 3;
        levelW = isBoss ? 1400 : 2000;

        for (let x = 0; x < levelW; x += TILE)
          platforms.push({ x, y: CH - TILE, w: TILE, h: TILE });
        for (let y = 0; y < CH; y += TILE) {
          platforms.push({ x: -TILE, y, w: TILE, h: TILE });
          platforms.push({ x: levelW, y, w: TILE, h: TILE });
        }

        if (!isBoss) {
          const floaters = [];
          for (let i = 0; i < 8 + w * 2 + l; i++) {
            const px = 300 + Math.random() * (levelW - 600);
            const py = CH - TILE - 80 - Math.random() * 100;
            const plat = {
              x: px,
              y: py,
              w: TILE * 3 + Math.floor(Math.random() * TILE * 4),
              h: TILE,
              float: true,
            };
            platforms.push(plat);
            floaters.push(plat);
          }
          const pits = [];
          for (let i = 0; i < 3 + w; i++) {
            let gx,
              gw,
              safe = false,
              attempts = 0;
            while (!safe && attempts < 50) {
              attempts++;
              gx = 400 + Math.random() * (levelW - 600);
              gw = TILE * (3 + Math.floor(Math.random() * 2));
              safe = true;
              for (const pit of pits) {
                if (gx < pit.x + pit.w + 140 && gx + gw > pit.x - 140) {
                  safe = false;
                  break;
                }
              }
            }
            if (safe) {
              pits.push({ x: gx, w: gw });
              platforms = platforms.filter(
                (p) =>
                  !(
                    p.float == null &&
                    p.x >= gx &&
                    p.x < gx + gw &&
                    p.y === CH - TILE
                  ),
              );
            }
          }
          const ec = 5 + w * 3 + l * 2;
          for (let i = 0; i < ec; i++) {
            let ex = 300 + Math.random() * (levelW - 500);
            let ey = CH - TILE - 18;
            if (floaters.length > 0 && Math.random() < 0.4) {
              let f = floaters[Math.floor(Math.random() * floaters.length)];
              ex = f.x + Math.random() * (f.w - 12);
              ey = f.y - 18;
            }
            enemies.push(mkEnemy(ex, ey, w));
          }
        } else {
          platforms.push({
            x: 200,
            y: CH - TILE - 80,
            w: TILE * 4,
            h: TILE,
            float: true,
          });
          platforms.push({
            x: 600,
            y: CH - TILE - 100,
            w: TILE * 4,
            h: TILE,
            float: true,
          });
          platforms.push({
            x: 1000,
            y: CH - TILE - 80,
            w: TILE * 4,
            h: TILE,
            float: true,
          });
          enemies.push(mkBoss(levelW / 2, CH - TILE - 40, w));
          document.getElementById("bossBarWrap").style.display = "block";
          document.getElementById("bossBarLabel").textContent = [
            "",
            "고블린 킹 [월드 1]",
            "스켈레톤 로드 [월드 2]",
            "데몬 로드 [월드 3]",
          ][Math.min(w, 3)];
        }
        doors.push({
          x: levelW - 60,
          y: CH - TILE - 64,
          w: 24,
          h: 64,
          open: false,
        });
        player = mkP(40, CH - TILE - 20);
        camX = 0;
        updateHUD();
      }

      function overlap(a, b) {
        return (
          a.x < b.x + b.w &&
          a.x + a.w > b.x &&
          a.y < b.y + b.h &&
          a.y + a.h > b.y
        );
      }
      function resolveAABB(obj) {
        obj.x += obj.vx;
        for (const t of platforms) {
          if (overlap(obj, t)) {
            if (obj.vx > 0) obj.x = t.x - obj.w;
            else if (obj.vx < 0) obj.x = t.x + t.w;
            obj.vx = 0;
          }
        }
        obj.y += obj.vy;
        obj.onGround = false;
        for (const t of platforms) {
          if (overlap(obj, t)) {
            if (obj.vy > 0) {
              obj.y = t.y - obj.h;
              obj.onGround = true;
            } else if (obj.vy < 0) obj.y = t.y + t.h;
            obj.vy = 0;
          }
        }
      }
      function addPart(x, y, col, life) {
        parts.push({
          x,
          y,
          col,
          vx: (Math.random() - 0.5) * 4.5,
          vy: (Math.random() - 0.5) * 4.5,
          life,
          ml: life,
        });
      }

      function takeDmg(d, attacker, unblockable = false) {
        if (invT > 0 || !player) return;
        let dir = player.facing;
        if (attacker) {
          dir = player.x < attacker.x ? -1 : 1;
        } else {
          dir = -player.facing;
        }

        if (player.guarding) {
          if (unblockable) {
            player.guarding = false;
            camShake = 10;
          } else {
            for (let i = 0; i < 5; i++)
              addPart(player.x + 7, player.y + 9, "#80d0ff", 15);
            player.vx = dir * 6.5;
            player.vy = -3.5;
            player.kbT = 18;
            invT = 40;
            if (attacker && attacker.hp !== undefined) {
              attacker.vx = -dir * (attacker.isBoss ? 1.5 : 5);
              attacker.kbT = 15;
            }
            return;
          }
        }

        player.hp -= d;
        invT = 70;
        player.vx = dir * 4.5;
        player.vy = -4.5;
        player.kbT = 15;
        camShake = 15;
        for (let i = 0; i < 10; i++)
          addPart(player.x + 7, player.y + 9, "#ff2222", 20);
        if (player.hp <= 0) {
          gs = "dead";
          showOv("YOU DIED", "스코어: " + score, "", "▶ RETRY");
        }
        updateHUD();
      }

      function hitE(e, d, dir) {
        if (e.dead) return;
        e.hp -= d;
        e.flash = 8;
        e.vx = dir * (e.isBoss ? 2 : 5);
        e.vy = -3;
        e.kbT = 12;
        for (let i = 0; i < 4; i++)
          addPart(e.x + e.w / 2, e.y + e.h / 2, "#ffa040", 12);
        if (e.hp <= 0) e.dead = true;
      }

      function updateBoss(e) {
        const p = player;
        if (!p) return;
        if (e.hp < e.maxHp * 0.5) e.phase = 2;
        e.vy = Math.min(e.vy + GRAV, 14);

        const dx = p.x + p.w / 2 - (e.x + e.w / 2),
          dy = p.y + p.h / 2 - (e.y + e.h / 2);
        if (!e.warnT) e.facing = dx > 0 ? 1 : -1;
        const spd = e.phase === 1 ? 2.2 : 3.5;

        if (e.kbT > 0) {
          e.kbT--;
          e.vx *= 0.88;
        } else if (e.warnT > 0) {
          e.warnT--;
          e.vx *= 0.8;
          if (e.warnT <= 0) {
            const wd = e.warnData;
            const w = e.world;

            if (w === 1) {
              if (e.ap === 0) {
                for (let s = -2; s <= 2; s++)
                  eBullets.push({
                    x: e.x + 14,
                    y: e.y + 18,
                    vx: Math.cos(wd.ang + s * 0.15) * 7,
                    vy: Math.sin(wd.ang + s * 0.15) * 7,
                    life: 100,
                    r: 4,
                  });
              } else if (e.ap === 1) {
                for (let s = -3; s <= 3; s++)
                  eBullets.push({
                    x: e.x + 14,
                    y: e.y + 18,
                    vx: Math.cos(wd.ang + s * 0.2) * 5,
                    vy: Math.sin(wd.ang + s * 0.2) * 5,
                    life: 100,
                    r: 4,
                  });
              } else {
                for (let i = 0; i < 16; i++)
                  eBullets.push({
                    x: e.x + 14,
                    y: e.y + 18,
                    vx: Math.cos((i * Math.PI) / 8) * 6,
                    vy: Math.sin((i * Math.PI) / 8) * 6,
                    life: 120,
                    r: 5,
                  });
              }
            } else if (w === 2) {
              if (e.ap === 0) {
                for (let i = 0; i < 6; i++)
                  eBullets.push({
                    x: e.x + 14,
                    y: e.y + 18,
                    vx: wd.facing * (3 + i * 1.5),
                    vy: -8,
                    life: 150,
                    r: 5,
                  });
              } else if (e.ap === 1) {
                lasers.push({
                  x: wd.facing > 0 ? e.x + e.w : 0,
                  y: e.y + 18,
                  w: wd.facing > 0 ? levelW : e.x,
                  h: 16,
                  life: 18,
                  maxLife: 18,
                  color: "#aa00ff",
                  dmg: 2,
                  unblockable: true,
                });
                camShake = 5;
              } else {
                lasers.push({
                  x: wd.facing > 0 ? e.x + e.w : 0,
                  y: e.y - 5,
                  w: wd.facing > 0 ? levelW : e.x,
                  h: 30,
                  life: 25,
                  maxLife: 25,
                  color: "#ff0044",
                  dmg: 2,
                  unblockable: true,
                });
                camShake = 8;
              }
            } else {
              if (e.ap === 0) {
                lasers.push({
                  x: 0,
                  y: e.y + 18,
                  w: levelW,
                  h: 10,
                  life: 15,
                  maxLife: 15,
                  color: "#ff1111",
                  dmg: 2,
                  unblockable: true,
                });
                for (let i = 0; i < 8; i++)
                  eBullets.push({
                    x: e.x + 14,
                    y: e.y + 18,
                    vx: Math.cos((i * Math.PI) / 4) * 8,
                    vy: Math.sin((i * Math.PI) / 4) * 8,
                    life: 100,
                    r: 4,
                  });
              } else if (e.ap === 1) {
                for (let i = 0; i < 8; i++)
                  eBullets.push({
                    x: e.x + 14,
                    y: e.y + 18,
                    vx: Math.cos((i * Math.PI) / 4) * 4,
                    vy: Math.sin((i * Math.PI) / 4) * 4,
                    life: 100,
                    r: 5,
                  });
                for (let i = 0; i < 5; i++)
                  eBullets.push({
                    x: e.x + 14,
                    y: e.y + 18,
                    vx: wd.facing * (4 + i * 1.5),
                    vy: -9,
                    life: 120,
                    r: 4,
                  });
              } else {
                lasers.push({
                  x: 0,
                  y: e.y + 5,
                  w: levelW,
                  h: 12,
                  life: 20,
                  maxLife: 20,
                  color: "#ff0000",
                  dmg: 2,
                  unblockable: true,
                });
                lasers.push({
                  x: 0,
                  y: e.y + 30,
                  w: levelW,
                  h: 12,
                  life: 20,
                  maxLife: 20,
                  color: "#ff0000",
                  dmg: 2,
                  unblockable: true,
                });
                for (let i = 0; i < 16; i++)
                  eBullets.push({
                    x: e.x + 14,
                    y: e.y + 18,
                    vx: Math.cos((i * Math.PI) / 8) * 5,
                    vy: Math.sin((i * Math.PI) / 8) * 5,
                    life: 120,
                    r: 5,
                  });
                camShake = 12;
              }
            }
          }
        } else {
          e.mT--;
          if (e.mT <= 0) {
            e.mT = e.phase === 1 ? 60 : 30;
            e.vx = e.facing * spd;
            if (Math.abs(dx) < 200 && e.onGround) e.vy = -10.5;
          }
          e.vx *= 0.84;

          e.sT--;
          if (e.sT <= 0) {
            e.sT = e.sI * (e.phase === 1 ? 1 : 0.5);
            e.ap = Math.floor(Math.random() * (e.phase === 1 ? 2 : 3));
            e.warnT = e.phase === 1 ? 35 : 25;
            e.warnData = {
              ang: Math.atan2(dy, dx),
              facing: e.facing,
              ap: e.ap,
            };
          }
        }

        resolveAABB(e);
        e.x = Math.max(0, Math.min(levelW - e.w, e.x));
        if (invT === 0 && overlap(player, { x: e.x, y: e.y, w: e.w, h: e.h }))
          takeDmg(1, e);
        if (e.y > CH + 60) e.dead = true;
        document.getElementById("bossFill").style.width =
          (Math.max(0, e.hp) / e.maxHp) * 100 + "%";
      }

      function update() {
        if (gs !== "play" || !player) return;
        const p = player;
        p.frT++;
        if (p.frT > 7) {
          p.fr = (p.fr + 1) % 4;
          p.frT = 0;
        }

        if (camShake > 0) camShake--;

        const guardNow = dn("KeyV");
        if (p.guarding && !guardNow) {
          if (invT < 15) invT = 15;
        }
        p.guarding = guardNow;

        if (p.kbT > 0) {
          p.kbT--;
          p.vx *= 0.9;
        } else {
          let mx = 0;
          if (!p.guarding) {
            if (dn("ArrowLeft", "KeyA")) mx = -1;
            if (dn("ArrowRight", "KeyD")) mx = 1;
          }
          if (mx !== 0) p.facing = mx;
          p.vx = mx * 2.8;
        }

        if (p.onGround) p.jumpCount = 0;
        const jpNow = dn("KeyZ", "ArrowUp", "Space");
        if (jpNow && !p.jpOld && !p.guarding && p.kbT <= 0) {
          if (p.onGround) {
            p.vy = -9.6;
            p.jumpCount = 1;
            for (let i = 0; i < 4; i++)
              addPart(p.x + 7, p.y + 18, "#6060ff", 12);
          } else if (p.jumpCount < 2) {
            p.vy = -8.8;
            p.jumpCount = 2;
            for (let i = 0; i < 6; i++)
              addPart(p.x + 7, p.y + 18, "#ff60ff", 15);
          }
        }
        p.jpOld = jpNow;

        p.vy = Math.min(p.vy + GRAV, 14);
        resolveAABB(p);
        p.x = Math.max(0, Math.min(levelW - p.w, p.x));

        if (p.y > CH + 60) {
          p.guarding = false;
          takeDmg(1, null, true);
          if (player) {
            p.x = 80;
            p.y = CH - TILE - 22;
            p.vx = 0;
            p.vy = 0;
          }
        }

        if (!player) return;

        if (p.atkT > 0) p.atkT--;
        if (p.atkAnim > 0) p.atkAnim--;
        if (invT > 0) invT--;
        if (skillCD > 0) skillCD--;

        if (dn("KeyX") && p.atkT === 0 && !p.guarding && p.kbT <= 0) {
          p.atkT = 16;
          p.atkAnim = 10;
          const sx = p.x + p.facing * 22,
            sy = p.y + 9;
          enemies.forEach((e) => {
            if (
              !e.dead &&
              Math.abs(e.x + e.w / 2 - sx) < 28 &&
              Math.abs(e.y + e.h / 2 - sy) < 22
            )
              hitE(e, 1, p.facing);
          });
          for (let i = 0; i < 5; i++) addPart(sx, sy, "#ffe060", 10);
          bullets.push({
            x: p.x + p.facing * 16,
            y: p.y + 9,
            vx: p.facing * 9,
            vy: 0,
            life: 8,
            r: 3,
            sk: false,
          });
        }
        if (dn("KeyC") && skillCD === 0 && !p.guarding && p.kbT <= 0) {
          skillCD = SKILL_MAX;
          for (let i = 0; i < 3; i++)
            bullets.push({
              x: p.x + 7,
              y: p.y + 9,
              vx: p.facing * (6 + i * 2),
              vy: -i * 1.5,
              life: 25,
              r: 4,
              sk: true,
            });
          bullets.push({
            x: p.x + 7,
            y: p.y + 9,
            vx: p.facing * 10,
            vy: 0,
            life: 25,
            r: 5,
            sk: true,
          });
          for (let i = 0; i < 8; i++) addPart(p.x + 7, p.y + 9, "#80d0ff", 18);
        }

        bullets.forEach((b) => {
          b.x += b.vx;
          b.y += b.vy;
          b.vy += b.sk ? 0.08 : 0;
          b.life--;
        });
        bullets = bullets.filter((b) => b.life > 0);
        bullets.forEach((b) => {
          for (const t of platforms) {
            if (
              overlap({ x: b.x - b.r, y: b.y - b.r, w: b.r * 2, h: b.r * 2 }, t)
            ) {
              b.life = 0;
              return;
            }
          }
          enemies.forEach((e) => {
            if (
              !e.dead &&
              Math.abs(e.x + e.w / 2 - b.x) < e.w / 2 + b.r &&
              Math.abs(e.y + e.h / 2 - b.y) < e.h / 2 + b.r
            ) {
              hitE(e, b.sk ? 2 : 1, b.vx > 0 ? 1 : -1);
              b.life = 0;
            }
          });
        });

        eBullets.forEach((b) => {
          b.x += b.vx;
          b.y += b.vy;
          b.vy += 0.12;
          b.life--;
        });
        eBullets = eBullets.filter((b) => b.life > 0 && b.y < CH + 30);
        eBullets.forEach((b) => {
          for (const t of platforms) {
            if (
              overlap({ x: b.x - b.r, y: b.y - b.r, w: b.r * 2, h: b.r * 2 }, t)
            ) {
              b.life = 0;
              return;
            }
          }
          if (
            invT === 0 &&
            Math.abs(p.x + 7 - b.x) < 11 &&
            Math.abs(p.y + 9 - b.y) < 12
          ) {
            takeDmg(1, b, b.unblockable);
            b.life = 0;
          }
        });

        lasers.forEach((l) => {
          if (l.life > l.maxLife - 5) {
            if (
              invT === 0 &&
              p.x + p.w > l.x &&
              p.x < l.x + l.w &&
              p.y + p.h > l.y &&
              p.y < l.y + l.h
            ) {
              takeDmg(l.dmg, null, l.unblockable);
            }
          }
          l.life--;
        });
        lasers = lasers.filter((l) => l.life > 0);

        enemies.forEach((e) => {
          if (e.dead) return;
          e.frT++;
          if (e.frT > 10) {
            e.fr = (e.fr + 1) % 2;
            e.frT = 0;
          }
          if (e.flash > 0) e.flash--;
          if (e.isBoss) {
            updateBoss(e);
            return;
          }

          e.vy = Math.min(e.vy + GRAV, 14);

          if (e.kbT > 0) {
            e.kbT--;
            e.vx *= 0.88;
          } else if (
            (e.type === "ranged_bullet" || e.type === "ranged_laser") &&
            e.warnT > 0
          ) {
            e.warnT--;
            e.vx *= 0.8;
            if (e.warnT <= 0) {
              const ang = e.warnData.ang;
              if (e.type === "ranged_bullet") {
                for (let s = -1; s <= 1; s++)
                  eBullets.push({
                    x: e.x + 6,
                    y: e.y + 8,
                    vx: Math.cos(ang + s * 0.15) * 7,
                    vy: Math.sin(ang + s * 0.15) * 7,
                    life: 80,
                    r: 4,
                  });
              } else {
                lasers.push({
                  x: e.facing > 0 ? e.x + e.w : 0,
                  y: e.y + 6,
                  w: e.facing > 0 ? levelW : e.x,
                  h: 6,
                  life: 12,
                  maxLife: 12,
                  color: "#ff3300",
                  dmg: 1,
                  unblockable: false,
                });
              }
            }
          } else {
            const dx = p.x + 7 - (e.x + e.w / 2),
              dy = p.y + 9 - (e.y + e.h / 2);
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 220) {
              e.facing = dx > 0 ? 1 : -1;
              if (e.type === "melee") {
                e.vx += (dx > 0 ? 1 : -1) * 0.2;
                e.vx = Math.max(-2.8, Math.min(2.8, e.vx));
              } else {
                if (dist < 110) e.vx += (dx > 0 ? -1 : 1) * 0.15;
                else e.vx *= 0.9;
                e.vx = Math.max(-2.0, Math.min(2.0, e.vx));
                e.sT--;
                if (e.sT <= 0) {
                  e.sT = e.sI;
                  e.warnT = e.type === "ranged_laser" ? 40 : 25;
                  e.warnData = { ang: Math.atan2(dy, dx), facing: e.facing };
                }
              }
            } else {
              e.pT--;
              if (e.pT <= 0) {
                e.pT = 60 + Math.random() * 60;
                e.pDir *= -1;
              }
              e.vx = e.pDir * 1.2;
            }
          }

          if (!e.isBoss && e.onGround && e.kbT <= 0) {
            let cx = e.vx > 0 ? e.x + e.w + e.vx + 2 : e.x + e.vx - 2;
            let cy = e.y + e.h + 4;
            let safe = false;
            for (const t of platforms) {
              if (
                cx >= t.x &&
                cx <= t.x + t.w &&
                cy >= t.y &&
                cy <= t.y + t.h
              ) {
                safe = true;
                break;
              }
            }
            if (!safe) {
              e.vx = 0;
              e.pDir *= -1;
            }
          }

          resolveAABB(e);
          if (e.vx === 0 && e.kbT <= 0) e.pDir *= -1;
          e.x = Math.max(0, Math.min(levelW - e.w, e.x));
          if (invT === 0 && overlap(p, { x: e.x, y: e.y, w: e.w, h: e.h }))
            takeDmg(1, e);
          if (e.y > CH + 60) e.dead = true;
        });

        enemies = enemies.filter((e) => {
          if (e.dead) {
            score += e.isBoss ? 500 : 50;
            kills++;
            for (let i = 0; i < 8; i++)
              addPart(
                e.x + e.w / 2,
                e.y + e.h / 2,
                e.isBoss ? "#ff40a0" : "#ff8040",
                25,
              );
            return false;
          }
          return true;
        });

        parts.forEach((p) => {
          p.x += p.vx;
          p.y += p.vy;
          p.vx *= 0.87;
          p.vy *= 0.87;
          p.life--;
        });
        parts = parts.filter((p) => p.life > 0);

        const allDead = enemies.length === 0;
        doors.forEach((d) => {
          d.open = allDead;
          if (
            d.open &&
            player &&
            overlap(player, { x: d.x, y: d.y, w: d.w, h: d.h })
          )
            nextStage();
        });

        if (!player) return;
        camX += (p.x - CW / 3 - camX) * 0.1;
        camX = Math.max(0, Math.min(levelW - CW, camX));
        updateHUD();
      }

      function nextStage() {
        levelN++;
        if (levelN > 3) {
          levelN = 1;
          worldN++;
          if (worldN > 3) {
            gs = "win";
            showOv(
              "LORD OF SKULLS (CLEAR)",
              "모든 악몽을 정복했습니다.",
              "스코어: " + score,
              "▶ PLAY AGAIN",
            );
            return;
          }
        }
        document.getElementById("bossBarWrap").style.display = "none";
        genStage(worldN, levelN);
        updateHUD();
      }

      function render() {
        ctx.fillStyle = "#050508";
        ctx.fillRect(0, 0, CW, CH);

        ctx.save();
        if (camShake > 0) {
          ctx.translate(
            (Math.random() - 0.5) * camShake,
            (Math.random() - 0.5) * camShake,
          );
        }

        ctx.fillStyle = "#0d0d14";
        for (let i = 0; i < 18; i++) {
          const bx = ((i * 173) % levelW) * 0.3 - camX * 0.3;
          const mod = bx % CW;
          if (mod > -20 && mod < CW + 20)
            ctx.fillRect(mod, 20 + ((i * 61) % 100), 4, 30 + ((i * 7) % 60));
        }

        platforms.forEach((t) => {
          const tx = t.x - camX,
            ty = t.y;
          if (tx > CW + TILE || tx < -TILE) return;
          if (t.float) {
            ctx.fillStyle = "#1a1a25";
            ctx.fillRect(tx, ty, t.w, t.h);
            ctx.fillStyle = "#333344";
            ctx.fillRect(tx, ty, t.w, 4);
          } else {
            ctx.fillStyle = "#110d0d";
            ctx.fillRect(tx, ty, t.w, t.h);
            ctx.fillStyle = "#2a1a1a";
            ctx.fillRect(tx, ty, t.w, 4);
            ctx.fillStyle = "#0a0505";
            ctx.fillRect(tx, ty + 4, t.w, t.h - 4);
            ctx.fillStyle = "#150a0a";
            for (let i = 0; i < t.w; i += TILE)
              ctx.fillRect(tx + i, ty, 1, t.h);
          }
        });

        doors.forEach((d) => {
          const dx = d.x - camX;
          ctx.fillStyle = d.open ? "#00220a" : "#110000";
          ctx.fillRect(dx, d.y, d.w, d.h);
          ctx.fillStyle = d.open ? "#00aa44" : "#551111";
          ctx.fillRect(dx + 4, d.y + 4, d.w - 8, d.h - 8);
          if (d.open) {
            ctx.fillStyle = "#44ff88";
            ctx.fillRect(dx + 8, d.y + 8, d.w - 16, d.h - 16);
          }
          ctx.fillStyle = d.open ? "#ffffff" : "#ff5555";
          ctx.font = "10px NeoDunggeunmo";
          ctx.textAlign = "center";
          ctx.fillText(
            d.open ? "ENTER" : "SEALED",
            dx + d.w / 2,
            d.y + d.h / 2 + 3,
          );
          ctx.textAlign = "left";
        });

        eBullets.forEach((b) => {
          const bx = b.x - camX;
          if (bx < -10 || bx > CW + 10) return;
          if (b.unblockable) {
            ctx.fillStyle = "#9900ff";
            ctx.beginPath();
            ctx.arc(bx, b.y, b.r * 1.4, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#ff0000";
            ctx.beginPath();
            ctx.arc(bx, b.y, b.r * 0.7, 0, Math.PI * 2);
            ctx.fill();
          } else {
            ctx.fillStyle = "#ff2222";
            ctx.beginPath();
            ctx.arc(bx, b.y, b.r, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#ffaaaa";
            ctx.beginPath();
            ctx.arc(bx, b.y, b.r * 0.5, 0, Math.PI * 2);
            ctx.fill();
          }
        });

        bullets.forEach((b) => {
          const bx = b.x - camX;
          if (bx < -10 || bx > CW + 10) return;
          ctx.fillStyle = b.sk ? "#44ddff" : "#ffcc22";
          ctx.beginPath();
          ctx.arc(bx, b.y, b.r, 0, Math.PI * 2);
          ctx.fill();
        });

        lasers.forEach((l) => {
          const lx = l.x - camX;
          if (lx + l.w < 0 || lx > CW) return;
          ctx.save();
          ctx.globalAlpha = l.life / l.maxLife;
          ctx.fillStyle = l.color;
          ctx.fillRect(lx, l.y, l.w, l.h);
          ctx.fillStyle = "#ffffff";
          ctx.fillRect(lx, l.y + l.h * 0.3, l.w, l.h * 0.4);
          ctx.restore();
        });

        parts.forEach((pt) => {
          const px = pt.x - camX;
          if (px < -10 || px > CW + 10) return;
          ctx.globalAlpha = pt.life / pt.ml;
          ctx.fillStyle = pt.col;
          ctx.fillRect(px - 2, pt.y - 2, 4, 4);
          ctx.globalAlpha = 1;
        });

        enemies.forEach((e) => {
          const ex = e.x - camX;
          if (ex < -50 || ex > CW + 50) return;
          ctx.save();
          ctx.translate(Math.round(ex + e.w / 2), Math.round(e.y + e.h / 2));

          if (e.warnT > 0) {
            ctx.save();
            if (e.isBoss) {
              const maxW = e.phase === 1 ? 35 : 25;
              ctx.globalAlpha = 0.2 + (1 - e.warnT / maxW) * 0.5;
              ctx.fillStyle = "#ff0033";
              const wd = e.warnData;

              if (e.world === 1) {
                if (wd.ap === 0) {
                  ctx.beginPath();
                  ctx.moveTo(0, 0);
                  ctx.arc(0, 0, 450, wd.ang - 0.3, wd.ang + 0.3);
                  ctx.fill();
                } else if (wd.ap === 1) {
                  ctx.beginPath();
                  ctx.moveTo(0, 0);
                  ctx.arc(0, 0, 450, wd.ang - 0.5, wd.ang + 0.5);
                  ctx.fill();
                } else {
                  ctx.beginPath();
                  ctx.arc(0, 0, 500, 0, Math.PI * 2);
                  ctx.fill();
                }
              } else if (e.world === 2) {
                if (wd.ap === 0) {
                  ctx.beginPath();
                  ctx.moveTo(0, 0);
                  ctx.arc(
                    0,
                    0,
                    400,
                    wd.facing > 0 ? -Math.PI * 0.8 : -Math.PI,
                    wd.facing > 0 ? 0 : -Math.PI * 0.2,
                  );
                  ctx.fill();
                } else if (wd.ap === 1) {
                  ctx.fillStyle = "#9900ff";
                  ctx.fillRect(wd.facing > 0 ? 0 : -800, -28, 800, 16);
                  ctx.fillRect(wd.facing > 0 ? 0 : -800, 4, 800, 16);
                } else {
                  ctx.fillStyle = "#ff0033";
                  ctx.fillRect(wd.facing > 0 ? 0 : -800, -23, 800, 35);
                }
              } else {
                if (wd.ap === 0) {
                  ctx.fillStyle = "#ff0000";
                  ctx.fillRect(-800, 0, 1600, 10);
                  ctx.beginPath();
                  ctx.moveTo(0, 0);
                  ctx.arc(0, 0, 500, wd.ang - 0.2, wd.ang + 0.2);
                  ctx.fill();
                } else if (wd.ap === 1) {
                  ctx.beginPath();
                  ctx.arc(0, 0, 400, 0, Math.PI * 2);
                  ctx.fill();
                } else {
                  ctx.fillRect(-800, -28, 1600, 12);
                  ctx.fillRect(-800, 17, 1600, 12);
                  ctx.beginPath();
                  ctx.arc(0, 0, 500, 0, Math.PI * 2);
                  ctx.fill();
                }
              }
            } else {
              if (e.type === "ranged_bullet") {
                ctx.globalAlpha = 0.2 + (1 - e.warnT / 25) * 0.4;
                ctx.fillStyle = "#ffaa00";
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, 350, e.warnData.ang - 0.3, e.warnData.ang + 0.3);
                ctx.fill();
              } else if (e.type === "ranged_laser") {
                ctx.globalAlpha = 0.5 + (1 - e.warnT / 40) * 0.5;
                ctx.fillStyle = "#ff2222";
                ctx.fillRect(e.warnData.facing > 0 ? 0 : -800, -2, 800, 4);
              }
            }
            ctx.restore();
          }

          ctx.scale(e.facing, 1);
          if (e.flash > 0 && e.flash % 2 === 0) ctx.globalAlpha = 0.4;

          const eBob = e.onGround && e.vx !== 0 ? (e.fr === 0 ? -1 : 0) : 0;
          const legL = e.fr === 0 ? 0 : -2;
          const legR = e.fr === 0 ? -2 : 0;

          if (e.isBoss) {
            ctx.scale(1.4, 1.4);
            if (e.world === 1) {
              ctx.fillStyle = "#1a552a";
              ctx.fillRect(-12, -12 + eBob, 24, 22);
              ctx.fillStyle = "#2e8b57";
              ctx.fillRect(-8, -20 + eBob, 16, 14);
              ctx.fillStyle = "#eeaa00";
              ctx.fillRect(-8, -24 + eBob, 16, 4);
              ctx.fillRect(-8, -26 + eBob, 3, 2);
              ctx.fillRect(-2, -26 + eBob, 3, 2);
              ctx.fillRect(5, -26 + eBob, 3, 2);
              ctx.fillStyle = e.phase === 2 ? "#ff2222" : "#000";
              ctx.fillRect(-4, -16 + eBob, 3, 3);
              ctx.fillRect(4, -16 + eBob, 3, 3);
              ctx.fillStyle = "#8b4513";
              ctx.fillRect(10, -5 + eBob, 6, 15);
            } else if (e.world === 2) {
              ctx.fillStyle = "#e0e0e0";
              ctx.fillRect(-10, -22 + eBob, 20, 16);
              ctx.fillStyle = e.phase === 2 ? "#ff0033" : "#aa00ff";
              ctx.fillRect(-6, -16 + eBob, 4, 4);
              ctx.fillRect(4, -16 + eBob, 4, 4);
              ctx.fillStyle = "#ccc";
              ctx.fillRect(-8, -4 + eBob, 16, 14);
              ctx.fillStyle = "#111";
              ctx.fillRect(-6, -2 + eBob, 12, 2);
              ctx.fillRect(-6, 2 + eBob, 12, 2);
              ctx.fillRect(-6, 6 + eBob, 12, 2);
              ctx.fillStyle = "#fff";
              ctx.fillRect(-4, -6 + eBob, 8, 2);
            } else {
              ctx.fillStyle = "#050505";
              ctx.fillRect(-12, -20 + eBob, 4, 12);
              ctx.fillRect(8, -20 + eBob, 4, 12);
              ctx.fillStyle = "#8b0000";
              ctx.fillRect(-8, -16 + eBob, 16, 14);
              ctx.fillStyle = "#1a0000";
              ctx.fillRect(-12, -2 + eBob, 24, 16);
              ctx.fillStyle = e.phase === 2 ? "#ff0000" : "#ffea00";
              ctx.fillRect(-4, -10 + eBob, 3, 3);
              ctx.fillRect(3, -10 + eBob, 3, 3);
              ctx.fillStyle = "#ff4500";
              ctx.fillRect(-4, 4 + eBob, 8, 8);
              ctx.fillStyle = "#111";
              ctx.fillRect(-18, -10 + eBob, 6, 16);
              ctx.fillRect(12, -10 + eBob, 6, 16);
            }
          } else if (e.type === "melee") {
            if (e.world === 1) {
              ctx.fillStyle = "#3cb371";
              ctx.fillRect(-4, -8 + eBob, 8, 6);
              ctx.fillStyle = "#000";
              ctx.fillRect(-2, -6 + eBob, 1, 2);
              ctx.fillRect(2, -6 + eBob, 1, 2);
              ctx.fillStyle = "#8b4513";
              ctx.fillRect(-3, -2 + eBob, 6, 6);
              ctx.fillStyle = "#3cb371";
              ctx.fillRect(-3, 4, 2, 4 + legL);
              ctx.fillRect(2, 4, 2, 4 + legR);
              ctx.fillStyle = "#8b4513";
              ctx.fillRect(4, -4 + eBob, 2, 10);
              ctx.fillStyle = "#a0522d";
              ctx.fillRect(3, -6 + eBob, 4, 4);
            } else if (e.world === 2) {
              ctx.fillStyle = "#e0e0e0";
              ctx.fillRect(-4, -8 + eBob, 8, 6);
              ctx.fillStyle = "#111";
              ctx.fillRect(-3, -6 + eBob, 2, 2);
              ctx.fillRect(2, -6 + eBob, 2, 2);
              ctx.fillRect(-1, -3 + eBob, 3, 1);
              ctx.fillStyle = "#d0d0d0";
              ctx.fillRect(-2, -2 + eBob, 5, 6);
              ctx.fillStyle = "#111";
              ctx.fillRect(-1, -1 + eBob, 3, 1);
              ctx.fillRect(-1, 1 + eBob, 3, 1);
              ctx.fillStyle = "#e0e0e0";
              ctx.fillRect(-2, 4, 2, 4 + legL);
              ctx.fillRect(1, 4, 2, 4 + legR);
              ctx.fillStyle = "#7f8c8d";
              ctx.fillRect(4, -4 + eBob, 2, 10);
              ctx.fillStyle = "#bdc3c7";
              ctx.fillRect(4, -8 + eBob, 2, 4);
            } else {
              ctx.fillStyle = "#8b0000";
              ctx.fillRect(-5, -8 + eBob, 10, 6);
              ctx.fillStyle = "#000";
              ctx.fillRect(-4, -11 + eBob, 2, 3);
              ctx.fillRect(3, -11 + eBob, 2, 3);
              ctx.fillStyle = "#ffeb3b";
              ctx.fillRect(-2, -6 + eBob, 2, 2);
              ctx.fillRect(1, -6 + eBob, 2, 2);
              ctx.fillStyle = "#5c0000";
              ctx.fillRect(-4, -2 + eBob, 9, 6);
              ctx.fillStyle = "#8b0000";
              ctx.fillRect(-3, 4, 2, 4 + legL);
              ctx.fillRect(2, 4, 2, 4 + legR);
              ctx.fillStyle = "#333";
              ctx.fillRect(5, -2 + eBob, 2, 8);
              ctx.fillStyle = "#444";
              ctx.fillRect(5, -6 + eBob, 5, 5);
            }
          } else {
            if (e.world === 1) {
              ctx.fillStyle = "#2e8b57";
              ctx.fillRect(-4, -8 + eBob, 8, 6);
              ctx.fillStyle = "#fff";
              ctx.fillRect(-3, -6 + eBob, 2, 2);
              ctx.fillRect(2, -6 + eBob, 2, 2);
              ctx.fillStyle = "#556b2f";
              ctx.fillRect(-3, -2 + eBob, 6, 6);
              ctx.fillStyle = "#2e8b57";
              ctx.fillRect(-3, 4, 2, 4 + legL);
              ctx.fillRect(2, 4, 2, 4 + legR);
              ctx.fillStyle = "#deb887";
              ctx.fillRect(4, -6 + eBob, 2, 10);
              ctx.fillRect(6, -4 + eBob, 1, 6);
            } else if (e.world === 2) {
              ctx.fillStyle = "#4a148c";
              ctx.fillRect(-5, -8 + eBob, 10, 12);
              ctx.fillStyle = "#e0e0e0";
              ctx.fillRect(-3, -5 + eBob, 6, 4);
              ctx.fillStyle = "#111";
              ctx.fillRect(-2, -4 + eBob, 1, 2);
              ctx.fillRect(1, -4 + eBob, 1, 2);
              ctx.fillStyle = "#9c27b0";
              ctx.fillRect(-3, 4 + eBob, 6, 2);
              ctx.fillStyle = "#5c4033";
              ctx.fillRect(5, -2 + eBob, 2, 8);
              ctx.fillStyle = "#aa00ff";
              ctx.fillRect(4, -5 + eBob, 4, 4);
            } else {
              ctx.fillStyle = "#220000";
              ctx.fillRect(-6, -6 + eBob, 12, 10);
              ctx.fillStyle = "#fff";
              ctx.fillRect(-4, -4 + eBob, 8, 6);
              ctx.fillStyle = "#ff0000";
              ctx.fillRect(1, -3 + eBob, 3, 4);
              ctx.fillStyle = "#111";
              ctx.fillRect(-10, -6 + eBob, 4, 8);
              ctx.fillRect(6, -6 + eBob, 4, 8);
            }
          }
          ctx.restore();

          // 잡몹 체력바 유지
          if (!e.isBoss) {
            const bw = 24,
              bx = ex + e.w / 2 - bw / 2,
              by = e.y - 6;
            if (bx > -10 && bx < CW) {
              ctx.fillStyle = "#220000";
              ctx.fillRect(bx, by, bw, 3);
              ctx.fillStyle = e.hp / e.maxHp > 0.5 ? "#22aa22" : "#cc2222";
              ctx.fillRect(bx, by, bw * Math.max(0, e.hp / e.maxHp), 3);
            }
          }
        });

        if (player) {
          const p = player,
            px = Math.round(p.x - camX),
            py = Math.round(p.y);
          if (invT === 0 || Math.floor(invT / 4) % 2 === 0) {
            const isMoving = p.vx !== 0;
            const isJumping = p.vy < 0;
            const isFalling = p.vy > 0;

            let pyOffset = 0;
            if (isJumping) pyOffset = -2;
            else if (isFalling) pyOffset = 0;
            else if (isMoving) pyOffset = Math.sin(p.fr * Math.PI) * 1.5;

            if (p.guarding) pyOffset += 3; // 가드 시 웅크림

            ctx.save();
            ctx.translate(px + 7, py + 9 + pyOffset);
            ctx.scale(p.facing, 1);

            // 1. 방어막
            if (p.guarding) {
              ctx.fillStyle = "rgba(100, 220, 255, 0.4)";
              ctx.beginPath();
              ctx.arc(1, -pyOffset, 17, 0, Math.PI * 2);
              ctx.fill();
              ctx.strokeStyle = "rgba(100, 220, 255, 0.9)";
              ctx.lineWidth = 2;
              ctx.stroke();
            }

            // 2. 머플러 꼬리 (뒤로 펄럭임)
            ctx.fillStyle = "#990000"; // 어두운 붉은색(그림자)
            if (isJumping) {
              ctx.fillRect(-12, 2, 8, 6);
              ctx.fillRect(-14, 6, 6, 4);
            } else if (isFalling) {
              ctx.fillRect(-12, -8, 8, 10);
              ctx.fillRect(-14, -12, 6, 4);
            } else if (isMoving) {
              const flap = Math.sin(p.fr * Math.PI) * 2;
              ctx.fillRect(-14, 2 + flap, 10, 5);
              ctx.fillRect(-16, 4 + flap, 6, 4);
            } else {
              ctx.fillRect(-9, 3, 5, 8);
              ctx.fillRect(-11, 8, 5, 5);
            }

            // 3. 몸통(갑옷/갈비뼈)
            ctx.fillStyle = "#1a1a25";
            ctx.fillRect(-6, 2, 12, 6);
            ctx.fillStyle = "#2a2a35";
            ctx.fillRect(-5, 2, 10, 5);

            // 4. 다리
            let pLegL = 0,
              pLegR = 0;
            if (isJumping) {
              pLegL = -2;
              pLegR = -4;
            } else if (isFalling) {
              pLegL = -1;
              pLegR = -2;
            } else if (isMoving) {
              pLegL = Math.sin(p.fr * Math.PI) * 3;
              pLegR = -Math.sin(p.fr * Math.PI) * 3;
            }

            ctx.fillStyle = "#f8f8fa";
            if (!p.guarding) {
              ctx.fillRect(-4, 7, 3, 4 + pLegL);
              ctx.fillRect(2, 7, 3, 4 + pLegR);
            } else {
              ctx.fillRect(-5, 5, 4, 2);
              ctx.fillRect(3, 5, 4, 2);
            }

            // 5. 해골 머리
            ctx.fillStyle = "#f8f8fa";
            ctx.fillRect(-6, -10, 14, 10);
            ctx.fillRect(-7, -8, 16, 6);
            ctx.fillStyle = "#d0d0d5";
            ctx.fillRect(-4, 0, 10, 3);
            ctx.fillStyle = "#808085";
            ctx.fillRect(-2, 0, 1, 3);
            ctx.fillRect(1, 0, 1, 3);
            ctx.fillRect(4, 0, 1, 3);

            // 붉은 눈
            ctx.fillStyle = "#0a0a0f";
            ctx.fillRect(2, -7, 4, 4);
            ctx.fillRect(-4, -7, 4, 4);
            ctx.fillStyle = p.atkAnim > 0 ? "#ff0000" : "#fff";
            ctx.fillRect(3, -6, 2, 2);
            ctx.fillRect(-3, -6, 2, 2);

            // 6. 머플러 매듭 (목 주변 - 가장 눈에 띄는 붉은색)
            ctx.fillStyle = "#cc0000";
            ctx.fillRect(-7, -1, 14, 4);
            ctx.fillStyle = "#ff3333";
            ctx.fillRect(-6, -1, 12, 2);

            // 7. 디테일한 뼈다귀 대검
            if (p.atkAnim > 0) {
              ctx.save();
              ctx.translate(5, 2);
              ctx.rotate(-Math.PI * 0.5 * (1 - p.atkAnim / 10) * p.facing);
              ctx.fillStyle = "#5c4033";
              ctx.fillRect(-2, -1, 4, 3); // 손잡이
              ctx.fillStyle = "#f8f8fa";
              ctx.fillRect(2, -2, 12, 5); // 뼈 몸통
              ctx.fillRect(12, -4, 4, 4);
              ctx.fillRect(12, 1, 4, 4); // 뼈 끝 관절(Knob)
              ctx.fillStyle = "#d0d0d5";
              ctx.fillRect(2, 1, 10, 2); // 명암
              ctx.restore();
            } else {
              ctx.fillStyle = "#5c4033";
              ctx.fillRect(2, 2, 3, 4);
              ctx.fillStyle = "#f8f8fa";
              ctx.fillRect(5, 1, 10, 4);
              ctx.fillRect(13, -1, 3, 3);
              ctx.fillRect(13, 3, 3, 3);
              ctx.fillStyle = "#d0d0d5";
              ctx.fillRect(5, 3, 8, 2);
            }
            ctx.restore();
          }
        }

        ctx.restore();

        if (enemies.length === 0 && doors.length > 0 && doors[0].open) {
          ctx.fillStyle = "rgba(0,255,100,0.06)";
          ctx.fillRect(0, 0, CW, CH);
          ctx.fillStyle = "#44ff88";
          ctx.font = "16px NeoDunggeunmo";
          ctx.textAlign = "center";
          ctx.fillText("AREA CLEARED → ENTER THE DOOR", CW / 2, 30);
          ctx.textAlign = "left";
        }

        const skillPct = skillCD / SKILL_MAX;
        ctx.fillStyle = "#111118";
        ctx.fillRect(CW - 100, CH - 22, 90, 12);
        if (skillCD > 0) {
          ctx.fillStyle = "#3344aa";
          ctx.fillRect(CW - 100, CH - 22, 90 * (1 - skillPct), 12);
          ctx.fillStyle = "#8899ff";
          ctx.font = "10px NeoDunggeunmo";
          ctx.textAlign = "center";
          ctx.fillText("SKILL CD", CW - 55, CH - 13);
        } else {
          ctx.fillStyle = "#113322";
          ctx.fillRect(CW - 100, CH - 22, 90, 12);
          ctx.fillStyle = "#33ff88";
          ctx.font = "10px NeoDunggeunmo";
          ctx.textAlign = "center";
          ctx.fillText("SKILL READY", CW - 55, CH - 13);
        }
        ctx.textAlign = "left";

        ctx.fillStyle = "#ffffff";
        ctx.font = "14px NeoDunggeunmo";
        ctx.fillText("Enemies: " + enemies.length, 10, 20);
      }

      function updateHUD() {
        if (!player) return;
        const hc = document.getElementById("hearts");
        hc.innerHTML = "";
        for (let i = 0; i < player.maxHp; i++) {
          const d = document.createElement("div");
          d.className = "heart" + (i >= player.hp ? " empty" : "");
          hc.appendChild(d);
        }
        document.getElementById("stageLabel").textContent =
          `STAGE ${worldN}-${levelN}${levelN === 3 ? " [BOSS]" : ""}`;
        document.getElementById("scoreLabel").textContent = "SCORE: " + score;
        document.getElementById("killLabel").textContent = "처치: " + kills;
        document.getElementById("skillLabel").textContent =
          skillCD > 0 ? "SKILL CD" : "SKILL READY";
        document.getElementById("skillLabel").style.color =
          skillCD > 0 ? "#e74c3c" : "#27ae60";
      }

      function showOv(t, s1, s2, btn) {
        document.getElementById("overlay").querySelector("h1").textContent = t;
        const subs = document.querySelectorAll("#overlay .sub");
        if (subs.length > 0) subs[0].textContent = s1;
        if (subs.length > 1) subs[1].textContent = s2;
        if (subs.length > 2) subs[2].textContent = "";
        const btnEl = document.querySelector(".startBtn");
        if (btnEl) btnEl.textContent = btn;
        document.getElementById("overlay").style.display = "flex";
      }

      function startGame() {
        score = 0;
        kills = 0;
        worldN = 1;
        levelN = 1;
        document.getElementById("bossBarWrap").style.display = "none";
        genStage(1, 1);
        gs = "play";
        document.getElementById("overlay").style.display = "none";
      }

      document.getElementById("startBtn").addEventListener("click", startGame);

      function loop() {
        update();
        if (gs === "menu") {
          ctx.fillStyle = "#050508";
          ctx.fillRect(0, 0, CW, CH);
          ctx.fillStyle = "#0a0505";
          for (let x = 0; x < CW; x += TILE)
            ctx.fillRect(x, CH - TILE, TILE, TILE);
        } else {
          render();
        }
        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);
    </script>
  </body>
</html>

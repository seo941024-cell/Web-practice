<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <ul>
        <li id="bad-li">item-1</li>
    </ul>

    <script>
        const parentEl = document.querySelector('ul');
        const targetEl = document.querySelector('#bad-li');

        targetEl.addEventListener('click', function(event){
            parentEl.removeChild(targetEl); // 부모가 자식을 삭제
        });
    </script>
</body>
</html>

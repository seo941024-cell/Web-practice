<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>오늘의 할 일 - 기초 실습</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .todo-box { max-width: 400px; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        .input-group { display: flex; gap: 5px; margin-top: 15px; }
        .input-group input { flex: 1; padding: 8px; font-size: 14px; }
        .input-group button { padding: 8px 15px; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="todo-box">
        <h2>오늘의 할 일</h2>
        
        <div class="input-group">
            <input type="text" id="todoInput" placeholder="할 일을 입력하세요">
            <button id="addBtn">추가</button>
        </div>
        <ul id="todoList"></ul>

        </div>
    </div>

    <script src="todo.js"></script>
</body>
</html>

    <script>
      while (1) {
        let choice = prompt(
          "메뉴를 선택하세요(1:짜장면, 2:짬뽕, 3:탕수육, 4.종료) >> ",

          console.log("프로그램을 종료합니다.");
          break;
        }
        console.log(choice);
      }
    </script>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <button id="btn">click me!</button>
    <script>
      const btn = document.querySelector("btn");

      function display() {
        alert("클릭했습니다.");
      }

      btn.addEventListener("click", display);
    </script>
  </body>
</html>

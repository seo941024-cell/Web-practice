<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Web Programming</title>
	<link rel="stylesheet" href="css/nodelist.css">
</head>
<body>
	<h1>Web Programming</h1>
	<ul>
		<li>HTML</li>
		<li>CSS</li>
		<li>Javascript</li>
	</ul>
	<button onclick = "addLi(); this.onclick='';">추가</button>
	<script>
		function addLi(){
			//1. 요소 생성 <li>TypeScriptM</li>
			let parentEl = document.querySelector('ul'); 
			let newItem = document.createElement('li');
			let textNode = document.createTextNode('TypeScript');

			newItem.appendChild(textNode);
			parentEl.appendChild(newItem);
		}

	</script>
</body>
</html>
